services:
  neo4j:
    image: neo4j:5.18
    container_name: codex-neo4j
    environment:
      NEO4J_AUTH: "neo4j/changeme"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # Neo4j Browser → http://localhost:7474
      - "7687:7687"   # Bolt (used by the API)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p changeme 'RETURN 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  neo4j_data:
